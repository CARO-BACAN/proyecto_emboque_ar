<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emboque</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #111111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        
        /* Ajustado a 85vh para dar espacio de sobra a las barras de Safari y Chrome */
        model-viewer { 
            width: 100%; 
            height: 85vh; 
            --ar-button-display: block; 
        }

        /* DISEÑO FINAL: Centrado simétrico calibrado y tipografía en negrita */
        #ar-button {
            background-color: rgba(255, 255, 255, 0.08); /* Fondo con 8% de opacidad */
            backdrop-filter: blur(12px);                 /* Efecto esmerilado para Android */
            -webkit-backdrop-filter: blur(12px);         /* Efecto esmerilado para iPhone */
            
            /* Icono de Realidad Aumentada (reajustado a 18px de la izquierda) */
            background-image: url(https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_24dp.png);
            background-repeat: no-repeat;
            background-position: 18px 50%;
            background-size: 24px 24px;
            
            color: #ffffff;                              /* Texto blanco de alta lectura */
            font-family: sans-serif;
            font-size: 16px;
            
            /* CORRECCIONES ESTÉTICAS SOLICITADAS: */
            font-weight: bold;                           /* Texto en negrita para mayor impacto */
            padding: 0 44px 0 52px;                      /* Nuevos márgenes para equilibrar el eje central */
            
            white-space: nowrap;                         /* Prohíbe que "espacio" se vaya abajo */
            width: auto;                                 /* Permite al botón estirarse a lo ancho */
            display: inline-block;                       /* Activa el comportamiento flexible */
            
            border-radius: 30px;                         /* Bordes completamente ovalados */
            height: 54px;
            line-height: 54px;
            
            /* Biselado de cristal y sombras de profundidad */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 
                        0 0 15px rgba(255, 255, 255, 0.05);
            
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 60px; /* Lo separa cómodamente de los marcos inferiores */
            z-index: 999;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Feedback visual al pulsar el botón en la pantalla táctil */
        #ar-button:active {
            transform: translateX(-50%) scale(0.95);
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* =========================================
           NUEVO: ESTILOS PARA LA VENTANA EMERGENTE 
           ========================================= */
        
        /* Forzamos que el botón siempre sea visible */
        model-viewer > #ar-button {
            display: block !important;
        }

        /* Contenedor principal oscuro del modal */
        #ar-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* Caja de contenido minimalista */
        .modal-contenido {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-contenido h3 { margin-top: 0; font-size: 1.2rem; margin-bottom: 15px; }
        .modal-contenido p { font-size: 0.95rem; color: #bbbbbb; line-height: 1.5; margin-bottom: 20px; }
        
        .modal-botones { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        
        .modal-botones button, .modal-botones a {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        #btn-cerrar { background-color: transparent; color: #ffffff; border: 1px solid #555555; }
        #btn-cerrar:hover { background-color: #333333; }
        
        #btn-alternativo { background-color: #ffffff; color: #111111; }
        #btn-alternativo:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <model-viewer 
        src="Emboque_android.glb" 
        ios-src="Emboque_apple.usdz" 
        ar 
        ar-modes="webxr quick-look"
        camera-controls 
        shadow-intensity="1" 
        environment-image="neutral" 
        auto-rotate
        ar-scale="fixed"
        disable-zoom>
        
        <button slot="ar-button" id="ar-button">
            Ver en tu espacio
        </button>
        
    </model-viewer>

    <div id="ar-modal">
        <div class="modal-contenido">
            <h3>¡No te quedes sin la experiencia!</h3>
            <p>Lamentamos que tu dispositivo no cuente con la tecnología nativa para proyectar este modelo.</p>
            <p>Pero hemos preparado un visor web alternativo para que sí puedas interactuar con él.</p>
            <div class="modal-botones">
                <button id="btn-cerrar">Volver</button>
                <a href="https://mywebar.com/qr/938276" id="btn-alternativo">Ver alternativa</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const modelViewer = document.querySelector('model-viewer');
            const arButton = document.querySelector('#ar-button');
            const modal = document.getElementById('ar-modal');
            const btnCerrar = document.getElementById('btn-cerrar');

            // 1. Interceptar el click en el botón "Ver en tu espacio"
            arButton.addEventListener('click', (event) => {
                if (!modelViewer.canActivateAR) {
                    event.preventDefault(); // Evita ir a la Play Store
                    modal.style.display = 'flex'; // Muestra tu ventana
                }
            });

            // 2. Escuchar si la realidad aumentada falla en el intento
            modelViewer.addEventListener('ar-status', (event) => {
                if (event.detail.status === 'failed') {
                    modal.style.display = 'flex'; // Muestra tu ventana
                }
            });

            // 3. Cerrar el modal si el usuario presiona "Volver"
            btnCerrar.addEventListener('click', () => {
                modal.style.display = 'none';
            });
        });
    </script>

</body>
</html>
